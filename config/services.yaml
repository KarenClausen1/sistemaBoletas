# config/services.yaml
parameters:
    boletas_upload_dir: '%kernel.project_dir%/var/uploads/boletas'

services:
    _defaults:
        autowire: true
        autoconfigure: true

    App\:
        resource: '../src/'
        exclude:
            - '../src/DependencyInjection/'
            - '../src/Entity/'
            - '../src/Kernel.php'